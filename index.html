<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>HTMZ Loader</title>

<style>
  .pdf-container {
    position: relative;
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    aspect-ratio: 16 / 9;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .pdf-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>

<script>
  function htmz(frame) {
    const targetSelector = frame.contentWindow.location.hash;
    if (!targetSelector) return;

    const target = document.querySelector(targetSelector);
    if (!target) return;

    target.replaceWith(...frame.contentDocument.body.childNodes);
  }
</script>

</head>
<body>

<!-- Hidden iframe used as loader -->
<iframe hidden name="htmz" onload="htmz(this)"></iframe>

<!-- Example Links -->
<a href="/flower.html#my-element" target="htmz">Flower</a>

<!-- Example Form -->
<form action="/default#my-target" target="htmz">
  <button type="submit">Default form action</button>
  <button type="submit" formaction="/button#my-target">
    Different button action
  </button>
  <button type="submit" formaction="/another-action#another-target">
    Another action
  </button>
</form>

<!-- Target elements -->
<div id="my-element"></div>
<div id="my-target"></div>
<div id="another-target"></div>

<!-- PDF Viewer -->
<div class="pdf-container">
  <iframe src="web_asset.pdf#toolbar=0&navpanes=0" type="application/pdf"></iframe>
</div>

</body>
</html>
